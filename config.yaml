dashboard:
  title: Homelab
  refresh_seconds: 90

sections:
  - id: media
    title: Media
    enabled: true
  - id: infra
    title: Infrastructure
    enabled: true
  - id: dev
    title: Development
    enabled: true
  - id: bookmarks
    title: Bookmarks
    enabled: true

# Services on the Pi: use 127.0.0.1 when running with network_mode: host
# Services on other devices: use their LAN IP (e.g. 192.168.1.50)
services:
  - id: jellyfin
    name: Jellyfin
    url: http://127.0.0.1:8096
    section: media
    icon: jellyfin
    check:
      type: http
      url: http://127.0.0.1:8096/health
      timeout_ms: 3000

  - id: pihole
    name: Pi-hole
    url: http://127.0.0.1/admin
    section: infra
    icon: pihole
    check:
      type: http
      url: http://127.0.0.1/admin
      timeout_ms: 3000

  - id: portainer
    name: Portainer
    url: http://127.0.0.1:9000
    section: infra
    icon: portainer
    check:
      type: http
      url: http://127.0.0.1:9000
      timeout_ms: 3000

  - id: homeassistant
    name: Home Assistant
    url: http://192.168.1.50:8123
    section: infra
    icon: homeassistant
    check:
      type: http
      url: http://192.168.1.50:8123
      timeout_ms: 3000

  - id: nas
    name: NAS
    url: http://192.168.1.60:5000
    section: infra
    icon: nas
    check:
      type: tcp
      host: 192.168.1.60
      port: 5000
      timeout_ms: 3000

  - id: code-server
    name: Code Server
    url: http://127.0.0.1:8443
    section: dev
    icon: code
    check:
      type: http
      url: http://127.0.0.1:8443
      timeout_ms: 3000

bookmarks:
  - title: Router
    url: http://192.168.1.1
    section: infra
    pinned: true

  - title: GitHub
    url: https://github.com
    section: dev
    pinned: true

  - title: Docker Docs
    url: https://docs.docker.com
    section: dev
    pinned: false

  - title: Raspberry Pi Docs
    url: https://www.raspberrypi.com/documentation/
    section: infra
    pinned: false
